<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网站主目录索引</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: url('https://source.unsplash.com/random/1920x1080?technology') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    h1 {
      color: #fff;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
      font-size: 48px;
      margin-bottom: 40px;
      letter-spacing: 2px;
      text-align: center;
      text-transform: uppercase;
      opacity: 0;
      animation: slideDown 1s 0.5s ease forwards;
    }

    @keyframes slideDown {
      0% {
        transform: translateY(-50px);
        opacity: 0;
      }

      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    ul {
      list-style-type: none;
      padding: 0;
      width: 400px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      opacity: 0;
      animation: fadeInUp 1s 1s ease forwards;
    }

    @keyframes fadeInUp {
      0% {
        transform: translateY(50px);
        opacity: 0;
      }

      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    li {
      padding: 20px 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      transition: background-color 0.4s ease, transform 0.4s ease;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background-color: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
    }

    a {
      text-decoration: none;
      color: #fff;
      font-size: 24px;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    a:hover {
      color: #ccc;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
    }

    a:active {
      transform: translateY(3px);
    }
  </style>
</head>

<body>
  <h1>网站主目录索引</h1>
  <ul>
    <li><a href="/others/calc/calc.html">计算器</a></li>
    <li><a href="/others/win12/desktop.html">win12 网页版</a></li>
    <li><a href="/assets/mcscratch.exe">mcscratch 版</a></li>
  </ul>
</body>

</html>
